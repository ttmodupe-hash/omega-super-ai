events { worker_connections 1024; }
http {
    upstream backend { server backend:8000; }
    upstream collab { server collab:4000; }
    
    server {
        listen 80;
        location / { root /usr/share/nginx/html; try_files $uri $uri/ /index.html; }
        location /api/ { proxy_pass http://backend; proxy_set_header Host $host; }
        location /socket.io/ { proxy_pass http://collab; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; }
        location /collab/ { proxy_pass http://collab; proxy_set_header Host $host; }
    }
}
