<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luqi AI - Your Intelligent Assistant</title>
<style>
:root{--bg:#0a0e17;--bg2:#0f1623;--card:#151d2e;--cyan:#00BCD4;--cyan-glow:rgba(0,188,212,0.15);--text:#e2e8f0;--text2:#94a3b8;--muted:#64748b;--user-bg:rgba(0,188,212,0.12);--user-border:rgba(0,188,212,0.3);--ai-bg:#151d2e;--ai-border:#1e2d45;--code:#0d1117;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.app{display:flex;flex-direction:column;height:100vh;background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 50%,#0c1320 100%)}
.header{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(15,22,35,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--ai-border);z-index:10;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--cyan) 0%,#008ba3 100%);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 15px rgba(0,188,212,0.3)}
.logo-text{background:linear-gradient(135deg,var(--text) 0%,var(--cyan) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.status{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)}
.status-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,0.5);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.7;transform:scale(0.85)}}
.icon-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--ai-border);background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-size:16px}
.icon-btn:hover{background:var(--card);color:var(--text);border-color:var(--cyan)}
.chat-area{flex:1;overflow-y:auto;padding:20px 24px;scroll-behavior:smooth}
.chat-area::-webkit-scrollbar{width:6px}
.chat-area::-webkit-scrollbar-thumb{background:rgba(100,116,139,0.3);border-radius:3px}
.messages{max-width:800px;margin:0 auto;display:flex;flex-direction:column;gap:4px}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 20px;animation:fadeInUp 0.6s ease}
.welcome-logo{width:72px;height:72px;background:linear-gradient(135deg,var(--cyan) 0%,#008ba3 100%);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:24px;box-shadow:0 0 40px rgba(0,188,212,0.25);animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.welcome-title{font-size:32px;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,var(--text) 0%,var(--cyan) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.welcome-subtitle{font-size:16px;color:var(--text2);margin-bottom:36px}
.cmd-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;width:100%;max-width:640px}
.cmd-chip{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--card);border:1px solid var(--ai-border);border-radius:12px;cursor:pointer;transition:all 0.15s;text-align:left}
.cmd-chip:hover{background:#1a2438;border-color:var(--cyan);transform:translateY(-1px);box-shadow:0 0 20px rgba(0,188,212,0.1)}
.cmd-chip-name{font-size:13px;font-weight:600;color:var(--text)}
.cmd-chip-desc{font-size:11px;color:var(--muted)}
.msg{display:flex;gap:12px;padding:16px 0;animation:msgIn 0.35s ease forwards;opacity:0;transform:translateY(12px)}
@keyframes msgIn{to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px}
.msg.user .msg-avatar{background:linear-gradient(135deg,var(--cyan) 0%,#008ba3 100%);box-shadow:0 0 10px rgba(0,188,212,0.3)}
.msg.ai .msg-avatar{background:linear-gradient(135deg,#1e293b 0%,#334155 100%);border:1px solid var(--ai-border)}
.msg-wrap{display:flex;flex-direction:column;gap:4px;max-width:calc(100% - 60px)}
.msg.user .msg-wrap{align-items:flex-end}
.msg-bubble{padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.65;word-wrap:break-word}
.msg.user .msg-bubble{background:var(--user-bg);border:1px solid var(--user-border);border-bottom-right-radius:4px}
.msg.ai .msg-bubble{background:var(--ai-bg);border:1px solid var(--ai-border);border-bottom-left-radius:4px}
.msg-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);padding:0 4px}
.msg.user .msg-meta{flex-direction:row-reverse}
.copy-btn{opacity:0;transition:opacity 0.15s;background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;padding:2px 6px;border-radius:4px}
.msg:hover .copy-btn{opacity:1}
.copy-btn:hover{color:var(--cyan);background:var(--card)}
.msg-bubble strong{color:var(--cyan);font-weight:600}
.msg-bubble code{background:rgba(0,188,212,0.1);color:var(--cyan);padding:2px 6px;border-radius:4px;font-family:'SF Mono',monospace;font-size:13px}
.msg-bubble pre{background:var(--code);border:1px solid #21262d;border-radius:8px;padding:14px 16px;margin:10px 0;overflow-x:auto}
.msg-bubble pre code{background:none;color:#e2e8f0;padding:0;font-size:13px}
.msg-bubble ul,.msg-bubble ol{margin:8px 0;padding-left:20px}
.msg-bubble blockquote{border-left:3px solid var(--cyan);margin:10px 0;padding:8px 14px;background:rgba(0,188,212,0.05);border-radius:0 8px 8px 0;color:var(--text2)}
.msg-bubble a{color:var(--cyan);text-decoration:none}
.msg-bubble a:hover{text-decoration:underline}
.typing{display:flex;align-items:center;gap:12px;padding:16px 0;animation:msgIn 0.3s ease forwards}
.typing-bubble{background:var(--ai-bg);border:1px solid var(--ai-border);border-radius:16px;border-bottom-left-radius:4px;padding:14px 18px;display:flex;align-items:center;gap:10px}
.typing-dots{display:flex;gap:4px}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--cyan);animation:bounce 1.4s ease-in-out infinite}
.typing-dots span:nth-child(1){animation-delay:0s}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-5px);opacity:1}}
.input-area{padding:12px 24px 20px;background:rgba(15,22,35,0.9);backdrop-filter:blur(20px);border-top:1px solid var(--ai-border);z-index:10;flex-shrink:0}
.input-wrap{max-width:800px;margin:0 auto;display:flex;align-items:flex-end;gap:10px;background:#1a2438;border:1px solid var(--ai-border);border-radius:20px;padding:8px 8px 8px 16px;transition:all 0.15s}
.input-wrap:focus-within{border-color:var(--cyan);box-shadow:0 0 0 3px var(--cyan-glow)}
.chat-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;line-height:1.5;resize:none;max-height:150px;min-height:24px;font-family:inherit;padding:6px 0}
.chat-input::placeholder{color:var(--muted)}
.send-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--cyan);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;font-size:16px}
.send-btn:hover{background:#00acc1;transform:scale(1.05);box-shadow:0 0 15px rgba(0,188,212,0.4)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.input-hint{text-align:center;font-size:11px;color:var(--muted);margin-top:8px}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--ai-border);color:var(--text);padding:10px 20px;border-radius:12px;font-size:13px;opacity:0;transition:all 0.3s;z-index:100;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.scroll-btn{position:fixed;bottom:90px;right:30px;width:40px;height:40px;border-radius:50%;background:var(--card);border:1px solid var(--ai-border);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(10px);pointer-events:none;transition:all 0.15s;z-index:5}
.scroll-btn.visible{opacity:1;transform:translateY(0);pointer-events:auto}
.scroll-btn:hover{background:#1a2438;color:var(--cyan);border-color:var(--cyan)}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){.header{padding:0 16px;height:56px}.chat-area{padding:12px}.input-area{padding:10px 12px 16px}.welcome-title{font-size:24px}.cmd-grid{grid-template-columns:1fr}.copy-btn{opacity:1}}
</style>
</head>
<body>
<div class="app">
<header class="header">
<div style="display:flex;align-items:center;gap:12px">
<div class="logo"><div class="logo-icon">&#9670;</div><span class="logo-text">Luqi AI</span></div>
<div class="status"><span class="status-dot"></span><span>Online</span></div>
</div>
<div style="display:flex;gap:8px">
<button class="icon-btn" onclick="clearChat()" title="Clear">&#128465;</button>
<a class="icon-btn" href="https://github.com/ttmodupe-hash/omega-super-ai" target="_blank" title="GitHub" style="text-decoration:none">&#9733;</a>
</div>
</header>
<div class="chat-area" id="chatArea"><div class="messages" id="messages"></div></div>
<button class="scroll-btn" id="scrollBtn" onclick="scrollToBottom()">&#9660;</button>
<div class="input-area">
<div class="input-wrap">
<textarea class="chat-input" id="chatInput" placeholder="Type a message or command..." rows="1" autocomplete="off"></textarea>
<button class="send-btn" id="sendBtn" onclick="sendMessage()">&#10148;</button>
</div>
<div class="input-hint"><kbd>Enter</kbd> to send &middot; <kbd>Shift</kbd>+<kbd>Enter</kbd> new line</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
(function(){'use strict';
const chatArea=document.getElementById('chatArea');
const messages=document.getElementById('messages');
const chatInput=document.getElementById('chatInput');
const sendBtn=document.getElementById('sendBtn');
const scrollBtn=document.getElementById('scrollBtn');
const toast=document.getElementById('toast');
let isTyping=false;
const STORAGE_KEY='luqi-ai-v1';
const COMMANDS={
'/research':{emoji:'&#128270;',name:'Research',desc:'Deep research on any topic',system:'You are a research assistant. Provide comprehensive, well-sourced information with clear headings, bullet points, and citations.'},
'/finance':{emoji:'&#128176;',name:'Finance',desc:'Financial analysis & advice',system:'You are a financial literacy educator. Provide educational information about personal finance, investing, and money management. Always include a disclaimer that this is educational only, not professional financial advice.'},
'/tax':{emoji:'&#128459;',name:'Tax',desc:'Tax calculations & guides',system:'You are a tax information assistant. Provide general educational information about tax systems. Always emphasize this is not professional tax advice and users should consult a certified tax professional.'},
'/opps':{emoji:'&#127942;',name:'Opportunities',desc:'Jobs, grants & tenders',system:'You are an opportunities advisor. Help users find jobs, business opportunities, grants, scholarships, and investments. Provide actionable guidance with source URLs where possible.'},
'/scam':{emoji:'&#128683;',name:'Scam Check',desc:'Detect fraud & scams',system:'You are a fraud prevention expert. Analyze text for scam indicators, explain red flags, and provide safety advice. Be thorough and practical.'},
'/think':{emoji:'&#129504;',name:'Think',desc:'Critical thinking analysis',system:'You are a critical thinking analyst. Break down problems step by step, identify assumptions, evaluate evidence, consider alternatives, and provide reasoned conclusions.'},
'/mentor':{emoji:'&#127891;',name:'Mentor',desc:'Learning & coaching',system:'You are a supportive mentor and coach. Create structured learning paths, set milestones, provide encouragement, and give actionable advice for growth.'},
'/expert':{emoji:'&#128084;',name:'Expert',desc:'Professional consultation',system:'You are a senior professional consultant. Provide expert-level analysis, best practices, and practical recommendations across multiple domains.'},
'/learn':{emoji:'&#128214;',name:'Learn',desc:'Study any topic',system:'You are an adaptive learning tutor. Create structured lesson plans with clear explanations, examples, exercises, and assessments.'}
};
const WELCOME_HTML=`<div class="welcome">
<div class="welcome-logo">&#9670;</div>
<div class="welcome-title">Luqi AI</div>
<div class="welcome-subtitle">Your Intelligent Assistant</div>
<div class="cmd-grid">`+
Object.entries(COMMANDS).map(([cmd,c])=>`<div class="cmd-chip" onclick="fillCommand('${cmd} ')"><span style="font-size:20px">${c.emoji}</span><div><div class="cmd-chip-name">${cmd}</div><div class="cmd-chip-desc">${c.desc}</div></div></div>`).join('')+
`</div></div>`;
function showToast(msg){toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000)}
function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
function mdToHtml(md){return md.replace(/^### (.*$)/gim,'<h3>$1</h3>').replace(/^## (.*$)/gim,'<h2>$1</h2>').replace(/^# (.*$)/gim,'<h1>$1</h1>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/`(.*?)`/g,'<code>$1</code>').replace(/^\> (.*$)/gim,'<blockquote>$1</blockquote>').replace(/^\- (.*$)/gim,'<li>$1</li>').replace(/^\d+\. (.*$)/gim,'<li>$1</li>').replace(/\n/g,'<br>')}
function addMessage(text,isUser){const div=document.createElement('div');div.className='msg '+(isUser?'user':'ai');const time=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});div.innerHTML=`<div class="msg-avatar">${isUser?'&#128100;':'&#9670;'}</div><div class="msg-wrap"><div class="msg-bubble">${isUser?escapeHtml(text):mdToHtml(text)}</div><div class="msg-meta"><span>${time}</span><button class="copy-btn" onclick="copyMsg(this)">&#128203; Copy</button></div></div>`;messages.appendChild(div);scrollToBottom();}
function showTyping(){const div=document.createElement('div');div.className='typing';div.id='typingIndicator';div.innerHTML='<div class="msg-avatar">&#9670;</div><div class="typing-bubble"><span style="font-size:13px;color:var(--muted)">Luqi is thinking</span><div class="typing-dots"><span></span><span></span><span></span></div></div>';messages.appendChild(div);scrollToBottom();return div;}
function removeTyping(){const t=document.getElementById('typingIndicator');if(t)t.remove();}
function scrollToBottom(){chatArea.scrollTop=chatArea.scrollHeight;}
function fillCommand(cmd){chatInput.value=cmd;chatInput.focus();}
function copyMsg(btn){const bubble=btn.closest('.msg-wrap').querySelector('.msg-bubble');const text=bubble.textContent.replace(' Copy','').trim();navigator.clipboard.writeText(text).then(()=>{showToast('Copied!');});}
function clearChat(){if(!confirm('Clear all messages?'))return;messages.innerHTML=WELCOME_HTML;localStorage.removeItem(STORAGE_KEY);}
function saveHistory(){const msgs=[];messages.querySelectorAll('.msg').forEach(m=>{const bubble=m.querySelector('.msg-bubble');if(bubble)msgs.push({text:bubble.textContent.replace(' Copy','').trim(),user:m.classList.contains('user')})});localStorage.setItem(STORAGE_KEY,JSON.stringify(msgs));}
function loadHistory(){const saved=localStorage.getItem(STORAGE_KEY);if(saved){try{const msgs=JSON.parse(saved);if(msgs.length>0){messages.innerHTML='';msgs.forEach(m=>addMessage(m.text,m.user));return;}}catch(e){}}messages.innerHTML=WELCOME_HTML;}
async function getAIResponse(userMsg,cmdInfo){const system=cmdInfo?cmdInfo.system:'You are Luqi AI, a helpful, knowledgeable assistant. Provide clear, well-structured answers with source citations when possible.';const msgs=[{role:'system',content:system},{role:'user',content:userMsg}];try{const resp=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+localStorage.getItem('oai_key')},body:JSON.stringify({model:'gpt-4o-mini',messages:msgs,temperature:0.7,max_tokens:2000})});const data=await resp.json();if(data.error)return `**Error:** ${data.error.message}\\n\\nPlease add your OpenAI API key by typing: **key YOUR_API_KEY**`;return data.choices[0].message.content||'No response.';}catch(e){return `**Luqi AI Offline Mode**\\n\\n${cmdInfo?cmdInfo.desc:'I'm ready to help!'}\\n\\nTo enable AI responses, add your OpenAI API key by typing:\\n**key YOUR_API_KEY**\\n\\nGet your key at: https://platform.openai.com/api-keys`;}}
async function sendMessage(){const text=chatInput.value.trim();if(!text||isTyping)return;const welcome=document.querySelector('.welcome');if(welcome)welcome.remove();chatInput.value='';chatInput.style.height='auto';addMessage(text,true);saveHistory();let cmdInfo=null;const parts=text.split(' ');if(parts[0].startsWith('/')&&COMMANDS[parts[0]]){cmdInfo=COMMANDS[parts[0]];}if(text.toLowerCase().startsWith('key ')){const key=text.substring(4).trim();localStorage.setItem('oai_key',key);addMessage('API key saved! You can now use AI-powered features.',false);return;}isTyping=true;sendBtn.disabled=true;const typing=showTyping();const hasKey=!!localStorage.getItem('oai_key');let response;if(!hasKey&&!text.toLowerCase().startsWith('key')){await new Promise(r=>setTimeout(r,1500));response=`Welcome to **Luqi AI!**\\n\\nI can help you with:\\n${Object.entries(COMMANDS).map(([c,info])=>`- ${c} - ${info.desc}`).join('\\n')}\\n\\nTo enable AI-powered responses, add your OpenAI API key:\\n**key YOUR_API_KEY**\\n\\nGet your key at https://platform.openai.com/api-keys\\n\\nYour key stays in your browser - I never see it.`;}else{response=await getAIResponse(text,cmdInfo);}removeTyping();addMessage(response,false);saveHistory();isTyping=false;sendBtn.disabled=false;}
chatInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
chatInput.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,150)+'px';});
chatArea.addEventListener('scroll',()=>{const nearBottom=chatArea.scrollHeight-chatArea.scrollTop-chatArea.clientHeight<100;scrollBtn.classList.toggle('visible',!nearBottom);});
loadHistory();
})();
</script>
</body>
</html>
