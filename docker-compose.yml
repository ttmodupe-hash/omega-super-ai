# Luqi AI v13 — Docker Compose
# Usage: docker-compose up -d
#        docker-compose logs -f
#        docker-compose down

version: "3.8"

services:
  luqi-ai:
    build: .
    container_name: luqi-ai
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./memory:/app/memory
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "luqi-ai.version=13.0.0"
      - "luqi-ai.description=Africa's AI Platform"
