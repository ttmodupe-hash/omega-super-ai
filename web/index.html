<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luqi AI v12</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%8E%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            accent: '#00d4ff',
            'accent-dim': '#00a3cc',
            surface: { 900: '#0a0e1a', 800: '#0f1629', 700: '#141d35', 600: '#1a2642', 500: '#223055', 400: '#2d3f66' },
          },
          animation: {
            'slide-up': 'slideUp 0.3s ease-out',
            'fade-in': 'fadeIn 0.2s ease-out',
          },
          keyframes: {
            slideUp: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
          },
        },
      },
    };
  </script>
  <style>
    * { scrollbar-width: thin; scrollbar-color: #223055 #0a0e1a; }
    *::-webkit-scrollbar { width: 6px; }
    *::-webkit-scrollbar-track { background: #0a0e1a; }
    *::-webkit-scrollbar-thumb { background: #223055; border-radius: 3px; }
    html, body, #root { height: 100%; margin: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #0a0e1a; color: #e2e8f0; overflow: hidden; }
    .msg-appear { animation: slideUp 0.3s ease-out forwards; }
    .code-block { position: relative; border-radius: 0.75rem; overflow: hidden; margin: 0.75rem 0; }
    .code-block pre { margin: 0; padding: 1rem; overflow-x: auto; font-size: 0.875rem; line-height: 1.6; background: #0a0e1a; border: 1px solid #1a2642; }
    .markdown-content table { border-collapse: collapse; width: 100%; margin: 0.75rem 0; font-size: 0.875rem; }
    .markdown-content th, .markdown-content td { border: 1px solid #223055; padding: 0.5rem; text-align: left; }
    .markdown-content th { background: rgba(0,212,255,0.08); font-weight: 600; }
    .markdown-content blockquote { border-left: 3px solid #00d4ff; padding-left: 1rem; margin: 0.75rem 0; color: #94a3b8; }
    .markdown-content a { color: #00d4ff; text-decoration: none; }
    .typing-dot { width: 6px; height: 6px; background: #00d4ff; border-radius: 50%; display: inline-block; animation: typingBounce 1.4s infinite ease-in-out both; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes typingBounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    @keyframes cursorBlink { 50% { opacity: 0; } }
    .typing-cursor::after { content: '|'; animation: cursorBlink 1s step-end infinite; color: #00d4ff; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:8000' : '';
    const API_KEY = 'luqi_api_key';
    const COMMANDS = {
      research: { emoji: '🔬', name: 'Research', desc: 'Deep research with citations', prompt: 'You are a research analyst. Provide thorough, well-cited research. Include sources and methodology.' },
      finance: { emoji: '💰', name: 'Finance', desc: 'Financial analysis', prompt: 'You are a financial analyst. Provide data-driven insights. Note: not financial advice.' },
      tax: { emoji: '📋', name: 'Tax', desc: 'Global tax guidance', prompt: 'You are a tax advisor with global knowledge. Provide general guidance. Recommend consulting a local professional.' },
      opps: { emoji: '🚀', name: 'Opportunities', desc: 'Find opportunities', prompt: 'You are an opportunity analyst. Identify trends, emerging markets, and actionable opportunities.' },
      scam: { emoji: '🛡️', name: 'Scam Guard', desc: 'Detect scams', prompt: 'You are a scam detection expert. Analyze for red flags and provide safety recommendations.' },
      think: { emoji: '🧠', name: 'Deep Think', desc: 'Critical thinking', prompt: 'You are a critical thinking coach. Analyze from multiple angles and challenge assumptions.' },
      mentor: { emoji: '👨‍🏫', name: 'Mentor', desc: 'Learn anything', prompt: 'You are a patient mentor. Break down topics into simple steps with examples.' },
      expert: { emoji: '⚡', name: 'Expert', desc: 'Technical deep-dive', prompt: 'You are a domain expert. Provide authoritative, technical responses.' },
      learn: { emoji: '📚', name: 'Learn', desc: 'Structured learning', prompt: 'You are a curriculum designer. Create structured learning paths.' },
    };
    const h = React.createElement;

    function App() {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [activeCmd, setActiveCmd] = useState(null);
      const [showCmds, setShowCmds] = useState(false);
      const [apiKey, setApiKey] = useState(localStorage.getItem(API_KEY) || '');
      const [showSettings, setShowSettings] = useState(false);
      const [recording, setRecording] = useState(false);
      const [sessionId] = useState(() => 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8));
      const endRef = useRef(null);
      const textareaRef = useRef(null);
      const recogRef = useRef(null);

      useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);
      useEffect(() => {
        const el = textareaRef.current;
        if (el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
      }, [input]);

      useEffect(() => {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) return;
        const r = new SR();
        r.continuous = false; r.interimResults = true;
        r.onresult = (e) => setInput(Array.from(e.results).map(x => x[0].transcript).join(''));
        r.onend = () => setRecording(false);
        r.onerror = () => setRecording(false);
        recogRef.current = r;
      }, []);

      const send = useCallback(async () => {
        const text = input.trim();
        if (!text || loading) return;

        if (text.toLowerCase().startsWith('key ')) {
          const key = text.slice(4).trim();
          localStorage.setItem(API_KEY, key);
          setApiKey(key);
          setMessages(p => [...p, { role: 'user', content: text }, { role: 'assistant', content: 'API key saved!' }]);
          setInput('');
          return;
        }

        let cmd = activeCmd, msgText = text;
        if (text.startsWith('/')) {
          const c = text.slice(1).split(' ')[0].toLowerCase();
          if (COMMANDS[c]) { cmd = c; msgText = text.slice(c.length + 2).trim(); }
        }

        setMessages(p => [...p, { role: 'user', content: text }]);
        setInput('');
        setLoading(true);
        setShowCmds(false);

        try {
          let respText = '';
          if (!apiKey) {
            const sp = cmd ? COMMANDS[cmd].prompt : 'You are a helpful assistant.';
            const msgs = [{ role: 'system', content: sp }, ...messages.filter(m => m.role !== 'system').slice(-10), { role: 'user', content: msgText || text }];
            const r = await fetch('https://api.openai.com/v1/chat/completions', {
              method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
              body: JSON.stringify({ model: 'gpt-4o-mini', messages: msgs, temperature: 0.7 })
            });
            if (!r.ok) throw new Error('API error: ' + r.status);
            const d = await r.json();
            respText = d.choices?.[0]?.message?.content || 'No response';
          } else {
            const r = await fetch(API_BASE + '/api/chat', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ message: msgText || text, mode: cmd || 'default', session_id: sessionId, temperature: 0.7 })
            });
            if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.detail || 'Server error: ' + r.status); }
            const d = await r.json();
            respText = d.response;
          }
          setMessages(p => [...p, { role: 'assistant', content: respText, command: cmd }]);
        } catch (err) {
          setMessages(p => [...p, { role: 'assistant', content: '**Error:** ' + err.message + '\\n\\nMake sure the server is running (`py -3.11 start_server.py`) or set your key with: `key YOUR_KEY`', isError: true }]);
        } finally { setLoading(false); }
      }, [input, loading, activeCmd, apiKey, messages, sessionId]);

      const onKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
        if (e.key === 'Escape') { setShowCmds(false); setShowSettings(false); }
      };
      const clear = () => { if (confirm('Clear all?')) { setMessages([]); setActiveCmd(null); } };
      const pickCmd = (k) => { setActiveCmd(k); setShowCmds(false); textareaRef.current?.focus(); };
      const saveKey = () => { const k = document.getElementById('aki').value.trim(); if (k) { localStorage.setItem(API_KEY, k); setApiKey(k); setShowSettings(false); } };
      const rmKey = () => { localStorage.removeItem(API_KEY); setApiKey(''); setShowSettings(false); };
      const toggleRec = () => { const r = recogRef.current; if (!r) return; if (recording) { r.stop(); setRecording(false); } else { r.start(); setRecording(true); } };

      return h('div', { className: 'flex flex-col h-screen bg-surface-900' },
        h('header', { className: 'flex items-center justify-between px-4 py-3 border-b border-surface-700 bg-surface-800 flex-shrink-0' },
          h('div', { className: 'flex items-center gap-3' },
            h('div', { className: 'w-9 h-9 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center text-lg' }, '💎'),
            h('div', null, h('h1', { className: 'text-lg font-bold' }, 'Luqi ', h('span', { className: 'text-cyan-400' }, 'AI')), h('p', { className: 'text-[11px] text-gray-500' }, 'World-class AI for Africa & beyond'))
          ),
          h('div', { className: 'flex items-center gap-2' },
            apiKey && h('span', { className: 'text-[10px] px-2 py-0.5 rounded-full bg-green-500/10 text-green-400 border border-green-500/20' }, 'Ready'),
            h('button', { onClick: () => setShowSettings(!showSettings), className: 'p-2 rounded-lg hover:bg-surface-700 text-gray-400 transition-colors', title: 'Settings' }, '⚙️'),
            h('button', { onClick: clear, className: 'p-2 rounded-lg hover:bg-red-500/10 text-gray-400 hover:text-red-400 transition-colors', title: 'Clear' }, '🗑️')
          )
        ),
        showSettings && h('div', { className: 'border-b border-surface-700 bg-surface-800 p-4 animate-fade-in' },
          h('div', { className: 'max-w-xl' },
            h('h3', { className: 'text-sm font-semibold mb-3' }, 'API Key'),
            h('div', { className: 'flex gap-2' },
              h('input', { id: 'aki', type: 'password', defaultValue: apiKey, placeholder: 'sk-...', className: 'flex-1 bg-surface-900 border border-surface-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-cyan-500' }),
              h('button', { onClick: saveKey, className: 'px-4 py-2 bg-cyan-600 hover:bg-cyan-500 rounded-lg text-sm font-medium' }, 'Save'),
              apiKey && h('button', { onClick: rmKey, className: 'px-4 py-2 bg-red-600/20 hover:bg-red-600/30 text-red-400 rounded-lg text-sm' }, 'Remove')
            ),
            h('p', { className: 'text-xs text-gray-500 mt-2' }, 'Stored only in browser. Or type: key YOUR_KEY in chat')
          )
        ),
        activeCmd && h('div', { className: 'flex-shrink-0 px-4 py-2 border-b border-surface-700/50 bg-surface-800/30' },
          h('div', { className: 'flex items-center gap-2' },
            h('span', { className: 'text-xs px-2 py-1 rounded-md bg-cyan-500/10 text-cyan-400 border border-cyan-500/20' }, COMMANDS[activeCmd].emoji + ' ' + COMMANDS[activeCmd].name + ' Mode'),
            h('button', { onClick: () => setActiveCmd(null), className: 'text-xs text-gray-500 hover:text-gray-300' }, 'Clear')
          )
        ),
        h('div', { className: 'flex-1 overflow-y-auto px-4 py-4' },
          messages.length === 0 && h('div', { className: 'flex flex-col items-center justify-center h-full text-center animate-slide-up' },
            h('div', { className: 'w-16 h-16 rounded-2xl bg-gradient-to-br from-cyan-500/20 to-blue-600/20 flex items-center justify-center mb-4 text-3xl' }, '💎'),
            h('h2', { className: 'text-xl font-bold mb-2' }, 'Welcome to Luqi AI'),
            h('p', { className: 'text-sm text-gray-400 max-w-md mb-6' }, 'Your world-class AI assistant. Ask anything, use commands, or type `/` for options.'),
            h('div', { className: 'grid grid-cols-2 sm:grid-cols-3 gap-2 max-w-lg w-full' },
              Object.entries(COMMANDS).slice(0, 6).map(([k, c]) =>
                h('button', { key: k, onClick: () => pickCmd(k), className: 'flex flex-col items-center gap-1 p-3 rounded-xl bg-surface-800 border border-surface-700 hover:border-cyan-500/30 transition-all' },
                  h('span', null, c.emoji), h('span', { className: 'text-xs font-medium' }, c.name), h('span', { className: 'text-[10px] text-gray-500' }, c.desc)
                )
              )
            )
          ),
          messages.map((m, i) => h(Message, { key: i, msg: m })),
          loading && h('div', { className: 'flex items-start gap-3 animate-fade-in' },
            h('div', { className: 'w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center flex-shrink-0 text-sm' }, '💎'),
            h('div', { className: 'flex-1' }, h('div', { className: 'inline-flex items-center gap-1 px-4 py-3 rounded-2xl rounded-tl-sm bg-surface-800 border border-surface-700' },
              h('span', { className: 'typing-dot' }), h('span', { className: 'typing-dot' }), h('span', { className: 'typing-dot' })
            ))
          ),
          h('div', { ref: endRef })
        ),
        showCmds && h('div', { className: 'flex-shrink-0 px-4 py-2 border-t border-surface-700 bg-surface-800/50' },
          h('div', { className: 'flex gap-2 overflow-x-auto pb-1' },
            Object.entries(COMMANDS).map(([k, c]) =>
              h('button', { key: k, onClick: () => pickCmd(k), className: 'flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-surface-700 hover:bg-surface-600 border border-surface-600 hover:border-cyan-500/30 transition-all whitespace-nowrap text-xs' },
                h('span', null, c.emoji), h('span', { className: 'font-medium' }, '/' + k)
              )
            )
          )
        ),
        h('div', { className: 'flex-shrink-0 border-t border-surface-700 bg-surface-800 px-4 py-3' },
          h('div', { className: 'max-w-3xl mx-auto' },
            h('div', { className: 'flex items-end gap-2 bg-surface-900 border border-surface-600 rounded-2xl p-2 focus-within:border-cyan-500/50 transition-all' },
              h('button', { onClick: () => setShowCmds(!showCmds), className: 'flex-shrink-0 p-2 rounded-xl hover:bg-surface-700 text-gray-400 hover:text-cyan-400 transition-colors text-lg', title: 'Commands' }, '⌘'),
              h('textarea', { ref: textareaRef, value: input, onChange: e => setInput(e.target.value), onKeyDown, placeholder: activeCmd ? 'Using ' + COMMANDS[activeCmd].name + ' mode...' : 'Ask Luqi AI...', rows: 1, className: 'flex-1 bg-transparent border-none outline-none text-sm resize-none py-2.5 px-1 max-h-[120px] placeholder-gray-500' }),
              h('button', { onClick: toggleRec, className: 'flex-shrink-0 p-2.5 rounded-xl transition-colors ' + (recording ? 'bg-red-500/20 text-red-400 animate-pulse' : 'hover:bg-surface-700 text-gray-400 hover:text-white'), title: recording ? 'Stop' : 'Voice' }, recording ? '⏹️' : '🎤'),
              h('button', { onClick: send, disabled: !input.trim() || loading, className: 'flex-shrink-0 p-2.5 rounded-xl bg-cyan-600 hover:bg-cyan-500 disabled:opacity-30 text-white transition-all' }, '➤')
            ),
            h('p', { className: 'text-[10px] text-gray-600 text-center mt-1.5' }, '/ for commands · Enter to send · Shift+Enter newline')
          )
        )
      );
    }

    function Message({ msg }) {
      const [copied, setCopied] = useState(false);
      const isUser = msg.role === 'user';
      const html = typeof window !== 'undefined' && window.marked ? window.marked.parse(msg.content || '', { breaks: true }) : (msg.content || '').replace(/\\n/g, '<br>');

      useEffect(() => { if (window.hljs) document.querySelectorAll('pre code').forEach(b => window.hljs.highlightElement(b)); }, [html]);

      const copy = () => navigator.clipboard.writeText(msg.content).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });

      if (isUser) return h('div', { className: 'flex items-start gap-3 mb-4 animate-slide-up justify-end' },
        h('div', { className: 'flex-1 max-w-[85%]' },
          h('div', { className: 'flex justify-end mb-1' }, h('span', { className: 'text-[10px] text-gray-500' }, 'You')),
          h('div', { className: 'bg-cyan-600/20 border border-cyan-500/20 rounded-2xl rounded-tr-sm px-4 py-3' },
            h('div', { className: 'text-sm whitespace-pre-wrap' }, msg.content)
          )
        ),
        h('div', { className: 'w-8 h-8 rounded-lg bg-surface-700 flex items-center justify-center flex-shrink-0' }, '👤')
      );

      return h('div', { className: 'flex items-start gap-3 mb-4 animate-slide-up' },
        h('div', { className: 'w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center flex-shrink-0 text-sm' }, '💎'),
        h('div', { className: 'flex-1 max-w-[90%]' },
          h('div', { className: 'flex items-center gap-2 mb-1' },
            h('span', { className: 'text-[10px] text-gray-500' }, 'Luqi AI'),
            msg.command && h('span', { className: 'text-[10px] px-1.5 py-0.5 rounded bg-cyan-500/10 text-cyan-400 border border-cyan-500/20' }, COMMANDS[msg.command]?.emoji + ' ' + COMMANDS[msg.command]?.name),
            h('button', { onClick: copy, className: 'text-gray-500 hover:text-cyan-400 text-xs', title: 'Copy' }, copied ? '✓' : '📋')
          ),
          h('div', { className: 'bg-surface-800 border ' + (msg.isError ? 'border-red-500/20' : 'border-surface-700') + ' rounded-2xl rounded-tl-sm px-4 py-3 markdown-content', dangerouslySetInnerHTML: { __html: html } })
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(h(App));
  </script>
</body>
</html>
