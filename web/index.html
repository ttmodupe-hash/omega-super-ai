                  React.createElement('span', { className: 'text-lg' }, cmd.emoji),
                  React.createElement('span', { className: 'text-xs font-medium' }, cmd.name),
                  React.createElement('span', { className: 'text-[10px] text-gray-500' }, cmd.desc)
                )
              )
            )
          ),

          messages.map((msg, i) =>
            React.createElement(MessageBubble, { key: i, message: msg, isLast: i === messages.length - 1 })
          ),

          isLoading && React.createElement('div', { className: 'flex items-start gap-3 animate-fade-in' },
            React.createElement('div', { className: 'w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center flex-shrink-0 mt-1' },
              React.createElement('span', { className: 'text-xs' }, '💎')
            ),
            React.createElement('div', { className: 'flex-1' },
              React.createElement('div', { className: 'inline-flex items-center gap-1 px-4 py-3 rounded-2xl rounded-tl-sm bg-surface-800 border border-surface-700' },
                React.createElement('span', { className: 'typing-dot' }),
                React.createElement('span', { className: 'typing-dot' }),
                React.createElement('span', { className: 'typing-dot' })
              )
            )
          ),

          React.createElement('div', { ref: messagesEndRef })
        ),

        // Command Palette
        showCommands && React.createElement('div', { className: 'flex-shrink-0 px-4 py-2 border-t border-surface-700 bg-surface-800/50' },
          React.createElement('div', { className: 'flex gap-2 overflow-x-auto pb-1 scrollbar-thin' },
            Object.entries(COMMANDS).map(([key, cmd]) =>
              React.createElement('button', {
                key,
                onClick: () => handleCommandClick(key),
                className: 'flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-surface-700 hover:bg-surface-600 border border-surface-600 hover:border-cyan-500/30 transition-all whitespace-nowrap text-xs'
              },
                React.createElement('span', null, cmd.emoji),
                React.createElement('span', { className: 'font-medium' }, '/' + key),
                React.createElement('span', { className: 'text-gray-500 hidden sm:inline' }, cmd.desc)
              )
            )
          )
        ),

        // Input Area
        React.createElement('div', { className: 'flex-shrink-0 border-t border-surface-700 bg-surface-800/80 backdrop-blur-sm px-4 py-3' },
          React.createElement('div', { className: 'max-w-3xl mx-auto' },
            React.createElement('div', { className: 'flex items-end gap-2 bg-surface-900 border border-surface-600 rounded-2xl p-2 focus-within:border-cyan-500/50 focus-within:shadow-[0_0_0_3px_rgba(0,212,255,0.1)] transition-all' },
              React.createElement('button', {
                onClick: () => setShowCommands(!showCommands),
                className: 'flex-shrink-0 p-2 rounded-xl hover:bg-surface-700 text-gray-400 hover:text-cyan-400 transition-colors text-lg',
                title: 'Commands'
              }, '⌘'),
              React.createElement('textarea', {
                ref: textareaRef,
                value: input,
                onChange: (e) => setInput(e.target.value),
                onKeyDown: handleKeyDown,
                placeholder: activeCommand ? `Using ${COMMANDS[activeCommand].name} mode...` : 'Ask Luqi AI anything...',
                rows: 1,
                className: 'flex-1 bg-transparent border-none outline-none text-sm resize-none py-2.5 px-1 max-h-[120px] placeholder-gray-500'
              }),
              React.createElement('button', {
                onClick: toggleRecording,
                className: `flex-shrink-0 p-2.5 rounded-xl transition-colors ${isRecording ? 'bg-red-500/20 text-red-400 animate-pulse' : 'hover:bg-surface-700 text-gray-400 hover:text-white'}`,
                title: isRecording ? 'Stop recording' : 'Voice input'
              }, isRecording ? React.createElement(Icons.micOff) : React.createElement(Icons.mic)),
              React.createElement('button', {
                onClick: handleSend,
                disabled: !input.trim() || isLoading,
                className: 'flex-shrink-0 p-2.5 rounded-xl bg-cyan-600 hover:bg-cyan-500 disabled:opacity-30 disabled:hover:bg-cyan-600 text-white transition-all hover:scale-105 active:scale-95'
              }, React.createElement(Icons.send))
            ),
            React.createElement('p', { className: 'text-[10px] text-gray-600 text-center mt-1.5' },
              'Press / for commands • Enter to send • Shift+Enter for new line'
            )
          )
        )
      );
    }

    // ── Message Bubble Component ─────────────────────────────────────────

    function MessageBubble({ message, isLast }) {
      const [copied, setCopied] = useState(false);
      const isUser = message.role === 'user';

      const handleCopy = () => {
        navigator.clipboard.writeText(message.content).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        });
      };

      // Parse markdown
      const htmlContent = typeof window !== 'undefined' && window.marked
        ? window.marked.parse(message.content || '', { breaks: true })
        : (message.content || '').replace(/\n/g, '<br>');

      useEffect(() => {
        if (window.hljs) {
          document.querySelectorAll('pre code').forEach((block) => {
            window.hljs.highlightElement(block);
          });
        }
      }, [htmlContent]);

      if (isUser) {
        return React.createElement('div', { className: 'flex items-start gap-3 mb-4 animate-slide-up justify-end' },
          React.createElement('div', { className: 'flex-1 max-w-[85%]' },
            React.createElement('div', { className: 'flex items-center gap-2 justify-end mb-1' },
              React.createElement('span', { className: 'text-[10px] text-gray-500' }, 'You')
            ),
            React.createElement('div', { className: 'bg-cyan-600/20 border border-cyan-500/20 rounded-2xl rounded-tr-sm px-4 py-3' },
              React.createElement('div', { className: 'text-sm whitespace-pre-wrap' }, message.content)
            )
          ),
          React.createElement('div', { className: 'w-8 h-8 rounded-lg bg-surface-700 flex items-center justify-center flex-shrink-0 text-sm' }, '👤')
        );
      }

      return React.createElement('div', { className: 'flex items-start gap-3 mb-4 animate-slide-up' },
        React.createElement('div', { className: 'w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center flex-shrink-0 text-sm' }, '💎'),
        React.createElement('div', { className: 'flex-1 max-w-[90%]' },
          React.createElement('div', { className: 'flex items-center gap-2 mb-1' },
            React.createElement('span', { className: 'text-[10px] text-gray-500' }, 'Luqi AI'),
            message.command && React.createElement('span', { className: 'text-[10px] px-1.5 py-0.5 rounded bg-cyan-500/10 text-cyan-400 border border-cyan-500/20' },
              COMMANDS[message.command]?.emoji + ' ' + COMMANDS[message.command]?.name
            ),
            React.createElement('button', {
              onClick: handleCopy,
              className: 'opacity-0 group-hover:opacity-100 transition-opacity p-1 hover:bg-surface-700 rounded',
              title: 'Copy'
            }, copied ? React.createElement(Icons.check) : React.createElement(Icons.copy))
          ),
          React.createElement('div', {
            className: `bg-surface-800 border ${message.isError ? 'border-red-500/20' : 'border-surface-700'} rounded-2xl rounded-tl-sm px-4 py-3 message-content group`,
            dangerouslySetInnerHTML: { __html: htmlContent }
          })
        )
      );
    }

    // ── Mount ────────────────────────────────────────────────────────────

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
  <script>
    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('data:text/javascript;base64,' + btoa(`
        self.addEventListener('install', e => self.skipWaiting());
        self.addEventListener('activate', e => e.waitUntil(clients.claim()));
        self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => new Response('Offline', { status: 503 }))));
      `)).catch(() => {});
    }
  </script>
</body>
</html>
