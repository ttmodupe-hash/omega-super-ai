function SB({ s }) {

  return <span className={`px-2 py-1 text-xs font-medium rounded-full ${m[s] || 'bg-gray-100 text-gray-800'}`}>{s}</span>;
}
function MB({ m }) {
  const c = { GET: 'bg-blue-100 text-blue-800', POST: 'bg-green-100 text-green-800', PUT: 'bg-yellow-100 text-yellow-800', DELETE: 'bg-red-100 text-red-800' };
  return <span className={`px-2 py-0.5 text-xs font-bold rounded ${c[m] || 'bg-gray-100'}`}>{m}</span>;
}
function SC({ c }) {
  return <span className={`text-sm font-medium ${c < 300 ? 'text-green-600' : 'text-red-600'}`}>{c}</span>;
}
function SevB({ s }) {
  const m = { high: 'bg-red-100 text-red-800', medium: 'bg-yellow-100 text-yellow-800', low: 'bg-blue-100 text-blue-800' };
  return <span className={`px-2 py-1 text-xs font-medium rounded-full ${m[s]}`}>{s}</span>;

// Charts
function LC({ d, l, lb, co = '#6366f1' }) {
  const c = useRef(null), ch = useRef(null);
  useEffect(() => {
    if (!c.current) return;
    if (ch.current) ch.current.destroy();
    const x = c.current.getContext('2d');
    ch.current = new Chart(x, { type: 'line', data: { labels: l, datasets: [{ label: lb, data: d, borderColor: co, backgroundColor: co + '20', fill: true, tension: 0.4, borderWidth: 2, pointRadius: 3 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#f3f4f6' } }, x: { grid: { display: false } } } }
    });
    return () => ch.current?.destroy();
  }, [d, l, lb, co]);
  return <canvas ref={c} />;
}
function BC({ d, l, lb, co = '#6366f1' }) {
  const c = useRef(null), ch = useRef(null);
  useEffect(() => {
    if (!c.current) return;
    if (ch.current) ch.current.destroy();
    const x = c.current.getContext('2d');
    ch.current = new Chart(x, { type: 'bar', data: { labels: l, datasets: [{ label: lb, data: d, backgroundColor: co + 'cc', borderRadius: 4, borderSkipped: false }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#f3f4f6' } }, x: { grid: { display: false } } } }
    });
    return () => ch.current?.destroy();
  }, [d, l, lb, co]);
  return <canvas ref={c} />;
}
function PC({ d, l, co }) {
  const c = useRef(null), ch = useRef(null);
  useEffect(() => {
    if (!c.current) return;
    if (ch.current) ch.current.destroy();
    const x = c.current.getContext('2d');
    ch.current = new Chart(x, { type: 'doughnut', data: { labels: l, datasets: [{ data: d, backgroundColor: co, borderWidth: 0, hoverOffset: 4 }] },
      options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { position: 'bottom', labels: { padding: 16, usePointStyle: true, pointStyle: 'circle' } } } }
    });
    return () => ch.current?.destroy();
  }, [d, l, co]);
  return <canvas ref={c} />;
}

// Stat Card

            <span className="text-gray-400 text-xs ml-1">vs yest.</span>
          </div>}
        </div>
        <div className="p-3 bg-indigo-50 rounded-lg text-indigo-600">{ic}</div>
      </div>
    </div>
  );
}

      <div className="bg-white rounded-lg shadow p-6"><h3 className="text-lg font-semibold text-gray-900 mb-4">General</h3>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div><label className="block text-sm font-medium text-gray-700 mb-1">Platform Name</label><input type="text" defaultValue="Luqi AI" className="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none" /></div>
          <div><label className="block text-sm font-medium text-gray-700 mb-1">Support Email</label><input type="email" defaultValue="admin@luqi.ai" className="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none" /></div>
          <div><label className="block text-sm font-medium text-gray-700 mb-1">Max Tokens</label><input type="number" defaultValue="4096" className="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none" /></div>
          <div><label className="block text-sm font-medium text-gray-700 mb-1">Rate Limit (req/min)</label><input type="number" defaultValue="60" className="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none" /></div>
        </div>
        <div className="mt-4"><button onClick={hs} className="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700">{sv ? 'Saved!' : 'Save Changes'}</button></div>
      </div>
      <div className="bg-white rounded-lg shadow p-6"><h3 className="text-lg font-semibold text-gray-900 mb-4">Notifications</h3>
        <div className="space-y-3">{['Email alerts for errors', 'Daily usage reports', 'Security incident notifications', 'New user signup alerts', 'Subscription change alerts'].map((lb, i) => <label key={i} className="flex items-center gap-3 cursor-pointer"><input type="checkbox" defaultChecked={i < 3} className="w-4 h-4 text-indigo-600 rounded" /><span className="text-sm text-gray-700">{lb}</span></label>)}</div>
      </div>
      <div className="bg-white rounded-lg shadow p-6"><h3 className="text-lg font-semibold text-gray-900 mb-4">API Config</h3>
        <div className="bg-gray-50 rounded-lg p-4 font-mono text-xs text-gray-700 space-y-2">
          <div className="flex justify-between"><span className="text-gray-500">API Base</span><span>/api/v1</span></div><div className="flex justify-between"><span className="text-gray-500">Auth</span><span>Bearer JWT</span></div><div className="flex justify-between"><span className="text-gray-500">CORS</span><span>https://luqi.ai</span></div><div className="flex justify-between"><span className="text-gray-500">Webhook</span><span>/api/webhooks</span></div>
        </div>
      </div>
      <div className="bg-white rounded-lg shadow p-6 border border-red-200">
        <h3 className="text-lg font-semibold text-red-700 mb-4 flex items-center gap-2"><I.da/> Danger Zone</h3>
        <div className="space-y-3">
          <div className="flex items-center justify-between p-3 bg-red-50 rounded-lg"><div><p className="text-sm font-medium text-red-800">Reset Analytics</p><p className="text-xs text-red-600">Clear all usage data.</p></div><button onClick={() => setCf('a')} className="px-3 py-1.5 border border-red-300 text-red-700 rounded text-sm hover:bg-red-100">Reset</button></div>
          <div className="flex items-center justify-between p-3 bg-red-50 rounded-lg"><div><p className="text-sm font-medium text-red-800">Clear Sessions</p><p className="text-xs text-red-600">Force logout all users.</p></div><button onClick={() => setCf('s')} className="px-3 py-1.5 border border-red-300 text-red-700 rounded text-sm hover:bg-red-100">Clear</button></div>
        </div>
      </div>
      {cf && <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50" onClick={() => setCf(null)}>
        <div className="bg-white rounded-lg shadow-xl p-6 max-w-sm w-full mx-4" onClick={e => e.stopPropagation()}>
          <h3 className="text-lg font-semibold text-red-700 mb-2">Confirm?</h3><p className="text-sm text-gray-600 mb-4">This cannot be undone.</p>
          <div className="flex gap-2"><button onClick={() => setCf(null)} className="flex-1 py-2 border rounded-lg text-sm hover:bg-gray-50">Cancel</button><button onClick={() => setCf(null)} className="flex-1 py-2 bg-red-600 text-white rounded-lg text-sm hover:bg-red-700">Confirm</button></div>
        </div>
      </div>}
    </div>
  );
}

// --- App ------------------------------------------------

        <div className="p-4 border-t border-gray-800"><div className="flex items-center gap-3"><div className="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-xs font-bold">A</div><div className="flex-1 min-w-0"><p className="text-sm font-medium truncate">Admin</p><p className="text-xs text-gray-500 truncate">admin@luqi.ai</p></div></div></div>

          <div className="flex items-center gap-3"><button onClick={() => setSo(true)} className="lg:hidden p-2 -ml-2 text-gray-600 hover:bg-gray-100 rounded-lg"><I.me/></button><h1 className="text-xl font-bold text-gray-900">{pt[pg]}</h1></div>
          <div className="flex items-center gap-3">
            <div className="relative hidden sm:block"><div className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><I.sc/></div><input type="text" placeholder="Search..." className="pl-10 pr-4 py-2 bg-gray-100 border-0 rounded-lg text-sm w-48 lg:w-64 focus:ring-2 focus:ring-indigo-500 outline-none" /></div>

root.render(<App/>);
</script>
